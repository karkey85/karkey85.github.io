<!DOCTYPE html>
<html>

<body>

<canvas id="matrix" width="500" height="300" ></canvas>


<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

// 1. Initialize the array with objects
const rainCount = 30;
const rain = [];
for (let i = 0; i < rainCount; i++) {
    rain.push({
        id: Math.random().toString(36).substring(2, 10), // random alphastrings
        x: i * 16, // Spread columns across the canvas
        y: Math.random() * -300, // Start at different heights off-screen
        speed: 5 + Math.random() * 5,
        size: 5 + Math.floor(Math.random() * 5)
    });
}

function draw() {
    // 2. Draw black background.. yet to do trailing translucent effect
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // 3. set green font.. yet to do tamil font
    ctx.fillStyle = "lightgreen";
    //ctx.font = "14px monospace";

    for (let i = 0; i < rain.length; i++) {
        let drop = rain[i];
        
        // 4. Draw every raindrop in a rainchain
        for (let dcnt = 0; dcnt < drop.size; dcnt++) {
            const char = drop.id[dcnt % drop.id.length];
            ctx.fillText(char, drop.x, drop.y + (dcnt * 15));
        }

        drop.y += drop.speed;
        // 5. reset raichain if completed.
        if (drop.y > canvas.height) {
            drop.y = -100;
            drop.id = Math.random().toString(36).substring(2, 10);
            drop.speed = 5 + Math.random() * 5;
        }
    }
}

setInterval(draw, 50);
</script>


</body>
</html>
