<!DOCTYPE html>
<html>
<body>

<canvas id="game" width="600" height="300" style="border:2px solid black"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Player position
let x = 50;
let y = 220;

// Keyboard input
document.addEventListener("keydown", move);

function move(event) {

  // Move left
  if (event.key == "ArrowLeft") {
    x = x - 20;
  }

  // Move right
  if (event.key == "ArrowRight") {
    x = x + 20;
  }

    // Move right
  if (event.key == "ArrowUp") {
    y = y - 20;
  }

    if (event.key == "ArrowDown") {
    y = y + 20;
  }
  draw();
}

// Draw everything
function draw() {

  // Clear old screen
  ctx.clearRect(0, 0, 600, 300);

  // Ground
  ctx.fillStyle = "green";
  ctx.fillRect(0, 260, 600, 40);

  // Player
  ctx.fillStyle = "red";
  ctx.fillRect(x, y, 40, 40);
}

// First draw
draw();

</script>

</body>
</html>
